<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro — Biblioteca</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="card">
        <h2>📚 Criar Conta</h2>

        <div id="alerta" style="display:none" class="alert"></div>

        <form id="formCadastro">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" required placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Cadastrar</button>
        </form>

        <p style="text-align:center; margin-top:1rem; font-size:0.9rem">
            Já tem conta? <a href="login.html">Entrar</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
        };

        const res = await fetch('/api/usuarios/cadastrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const alerta = document.getElementById('alerta');
        if (res.status === 201) {
            alerta.textContent = 'Conta criada! Redirecionando...';
            alerta.className = 'alert alert-success';
            alerta.style.display = 'block';
            setTimeout(() => window.location.href = '/login.html', 1500);
        } else {
            const msg = await res.text();
            alerta.textContent = msg || 'Erro ao cadastrar.';
            alerta.className = 'alert alert-error';
            alerta.style.display = 'block';
        }
    });
</script>
</body>
</html>
