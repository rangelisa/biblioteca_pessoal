<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login — Biblioteca</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="card">
        <h2>📚 Biblioteca Pessoal</h2>

        <div id="alerta" class="alert alert-error" style="display:none"></div>

        <form id="formLogin">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required placeholder="••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
        </form>

        <p style="text-align:center; margin-top:1rem; font-size:0.9rem">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('erro')) mostrarAlerta('Email ou senha incorretos.');
    if (params.get('logout')) mostrarAlerta('Logout realizado com sucesso.', true);

    function mostrarAlerta(msg, sucesso = false) {
        const el = document.getElementById('alerta');
        el.textContent = msg;
        el.className = 'alert ' + (sucesso ? 'alert-success' : 'alert-error');
        el.style.display = 'block';
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = new URLSearchParams();
        body.append('username', document.getElementById('email').value);
        body.append('password', document.getElementById('senha').value);

        const res = await fetch('/api/login', { method: 'POST', body });
        if (res.ok || res.redirected) {
            window.location.href = '/index.html';
        } else {
            mostrarAlerta('Email ou senha incorretos.');
        }
    });
</script>
</body>
</html>
